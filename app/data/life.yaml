- category: "Drums & Music"
  blurb: >
    Multi-percussionist and drummer with 16 years of classically focused training.
    Started classical percussion in 2009 and drum set in 2010, playing everything
    from jazz, fusion, and New Orleans brass band to metal, rock, and indie.
    I've been regularly gigging and involved in the music scenes of Washington, D.C.
    and Denver since 2019, and hold a four-year music scholarship with the George
    Mason Green Machine — the #1 ranked pep band in the nation by ESPN.
  highlights:
    - "Carnegie Hall (2015) — Flutopia Wind Ensemble, one of two percussionists (~3,000 audience members)"
    - "Jiffy Lube Live Amphitheater (2017) — Lady A at WMZQ Fest (~15,000 audience members)"
    - "The Anthem, Washington D.C. (2019) — GriZ drumline (~5,000 audience members)"
    - "Bluebird Theater, Denver (2024 & 2025) — Sold-out show with May be Fern playing original funk/pop"
    - "GMU Green Machine Rhythm Section Leader — led the #1 ranked pep band in the nation (ESPN)"
    - "Highschool Drumline Captain (2014–2016) — two state championships, multiple best percussion awards"

- category: "Climbing"
  blurb: >
    I got into climbing in college and it stuck. The problem-solving aspect hooked me —
    every route is a puzzle you have to commit to. From 2021 to 2022 I coached competitive
    youth rock climbing, teaching kids ages 9–16 technique, drills, and creative
    problem solving on the wall.
  highlights:
    - "Climbing Coach (Sept 2021 – Feb 2022) — coached competitive youth climbers ages 9–16"
    - "Currently climbing in the DMV area"

- category: "Mountain Biking & Cycling"
  blurb: >
    If I'm not behind a keyboard or a kit, I'm probably on a trail or a road somewhere.
    Mountain biking, road cycling, and general outdoor movement are how I decompress.
    Mountain biking in particular scratches the same itch as a tight feedback loop —
    immediate consequences for bad decisions.
  highlights:
    - "Mountain biker, cyclist, and general trail enthusiast"
    - "Currently riding trails in the DMV and Colorado"

- category: "Everything Else"
  blurb: >
    Outdoors is the theme. Mountaineering, skiing, hiking — if it involves elevation
    and a reasonable chance of suffering, I'm probably interested. Brother of Kappa
    Kappa Psi, a band service fraternity where I provided service to high school bands,
    the GMU indoor drumline, and on-campus events.
  highlights:
    - "Mountaineer, skier, hiker"
    - "Brother of Kappa Kappa Psi — band service fraternity"
