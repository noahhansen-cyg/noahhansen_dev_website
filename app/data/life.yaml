- category: "Drums & Music"
  blurb: >
    Multi-percussionist and drummer with 16 years of classically focused training.
    Started classical percussion in 2009 and drum set in 2010, playing everything
    from jazz, fusion, New Orleans style brass band, metal, rock, and indie.
    I've been regularly gigging and involved in the music scenes of Washington, D.C.
    and Denver since 2019, and held a four-year music scholarship with the George
    Mason Green Machine — the #1 ranked pep band in the nation by ESPN. I'm a hyperactive
    member of the DC and Denver music scenes, and have played with artists including May be Fern
    and The Wrizzards. 

- category: "Climbing"
  blurb: >
    I got into climbing in college and it stuck. The problem-solving aspect hooked me —
    every route is a puzzle you have to commit to. From 2021 to 2022 I coached competitive
    youth rock climbing, teaching kids ages 9–16 technique, drills, and creative
    problem solving on the wall. Climbing is something I connect very closely to the engineering
    mindset that I have. Active problem solving is my jam and climbing is a perfect outlet for that.

- category: "Mountain Biking & Cycling"
  blurb: >
    If I'm not behind a keyboard or a kit, I'm probably on a trail or a road somewhere.
    Mountain biking, road cycling, and general outdoor movement are how I decompress.
    Mountain biking in particular scratches the same itch as a tight feedback loop —
    immediate consequences for bad decisions.
  highlights:
    - "Mountain biker, cyclist, and general trail enthusiast"
    - "Currently riding trails in the DMV and Colorado"

- category: "Skiing"
  blurb: >
    Copper Mountain is home. My favorite terrain is big mountain double black runs —
    narrow chutes, variable snow, no margin for error. There's something about
    jump turning down a steep chute that demands the same full-presence focus as
    a hard climbing route or a tight musical groove. If it involves elevation and
    a reasonable chance of suffering, I'm in.
  highlights:
    - "Home mountain: Copper Mountain, Colorado"
    - "Favorite terrain: big mountain double blacks and chutes"

- category: "Video Games"
  blurb: >
    Video games have become the best way I stay connected with friends who live in
    different states. There's something genuinely irreplaceable about dropping into
    a session with people you care about, no matter where everyone is. I gravitate
    toward games with depth — ones that reward time investment and keep revealing
    new layers.
  highlights:
    - "Dota 2 — the deepest game I've ever played and probably ever will"
    - "Monster Hunter — the grind is the point"
    - "Legend of Zelda — the series that never misses"
