- name: "Photo Quiplash"
  description: >
    A party game like Quiplash, but with photos. A prompt appears — players submit
    photos from their phones, everyone votes, chaos ensues. No app install needed;
    players join via browser. Packages as a double-clickable desktop installer
    compatible with Steam.
  tech: ["Python", "Flask", "React", "Socket.IO", "Electron", "PyInstaller"]
  url: "https://github.com/noahhansen-cyg/quiplash_but_fun_and_pictures-"
  status: "active"

- name: "noahx1.dev"
  description: >
    This website. A personal portfolio built with Flask and Jinja2, content-driven
    via YAML files so updates never require touching HTML or Python. Tested with
    pytest, linted with flake8, and deployed on Render with GitHub Actions CI.
  tech: ["Python", "Flask", "pytest", "Vanilla CSS"]
  url: "https://github.com/noahhansen-cyg/noahx1_dev_website"
  status: "active"
