<section id="life" class="section">
    <div class="container">
        <h2 class="section-title">Life</h2>

        <div class="life-grid">
            {% for entry in life %}
            <div class="life-card{% if entry.url %} life-card--linked{% endif %}">
                {% if entry.url %}
                <a href="{{ entry.url }}" class="stretched-link" target="_blank" rel="noopener" aria-label="{{ entry.category }}"></a>
                {% endif %}
                <h3>{{ entry.category }}</h3>
                <p>{{ entry.blurb }}</p>
                {% if entry.highlights %}
                <ul class="highlights">
                    {% for highlight in entry.highlights %}
                    <li>{{ highlight }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</section>
