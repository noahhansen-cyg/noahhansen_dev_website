<section id="life" class="section">
    <h2 class="section-title">Life</h2>

    <div class="life-grid">
        {% for entry in life %}
        <div class="life-card">
            <h3>{{ entry.category }}</h3>
            <p>{{ entry.blurb }}</p>
            {% if entry.highlights %}
            <ul class="highlights">
                {% for highlight in entry.highlights %}
                <li>{{ highlight }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</section>
