<section id="contact" class="section">
    <div class="container">
        <h2 class="section-title">Contact Me</h2>
        <p class="contact-intro">
            Have a question or want to work together? Send me a message or reach me
            directly at <a href="mailto:{{ links.email }}">{{ links.email }}</a>.
        </p>
        <form class="contact-form" novalidate>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="What's on your mind?" rows="5"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Send Message</button>
                <p class="form-status" aria-live="polite"></p>
            </div>
        </form>
    </div>
</section>
