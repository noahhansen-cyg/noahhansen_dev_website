<section id="hero" class="hero">
    <div class="container">
        <h1>{{ links.name }}</h1>
        <h2>{{ work.title }}</h2>
        <p class="hero-location">{{ links.location }}</p>
        <p class="hero-summary">{{ work.summary }}</p>
        <div class="hero-actions">
            <a href="{{ links.github }}" class="btn" target="_blank" rel="noopener">GitHub</a>
            <a href="{{ links.linkedin }}" class="btn" target="_blank" rel="noopener">LinkedIn</a>
            <a href="/resume" class="btn btn-outline">Resume</a>
        </div>
    </div>
</section>
