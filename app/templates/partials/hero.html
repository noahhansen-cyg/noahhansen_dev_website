<section id="hero" class="hero">
    <div class="container">
        <h1>{{ links.name }}</h1>
        <h2>{{ work.title }}</h2>
        <p class="hero-location">{{ links.location }}</p>
        <p class="hero-summary">{{ work.summary }}</p>
        <div class="hero-actions">
            <a href="{{ links.github }}" class="btn" target="_blank" rel="noopener">GitHub</a>
            <a href="{{ links.linkedin }}" class="btn" target="_blank" rel="noopener">LinkedIn</a>
            <a href="/resume" class="btn btn-outline">Resume</a>
        </div>
    </div>
    <div class="scroll-hint" aria-hidden="true">
        <span>scroll for more</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
</section>
