<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ links.name }} — Software Engineer, drummer, and outdoor enthusiast.">
    <title>{{ links.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="#" class="nav-name">{{ links.name }}</a>
            <ul class="nav-links">
                <li><a href="#work">Work</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#life">Life</a></li>
                <li><a href="#links">Links</a></li>
            </ul>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>{{ links.name }} &middot; <a href="mailto:{{ links.email }}">{{ links.email }}</a></p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
