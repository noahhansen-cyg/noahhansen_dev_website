{% extends "base.html" %}

{% block content %}
<div class="resume-viewer">

        <a href="{{ url_for('static', filename='assets/resume.pdf') }}" download class="btn">Download</a>

    <embed
        src="{{ url_for('static', filename='assets/resume.pdf') }}"

        class="resume-embed"
    />
</div>
{% endblock %}
