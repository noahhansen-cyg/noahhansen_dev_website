name: Keep Alive

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping noahhansen.dev
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://www.noahhansen.dev)
          echo "Response: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 400 ]; then
            echo "Unexpected status code: $response"
            exit 1
          fi
